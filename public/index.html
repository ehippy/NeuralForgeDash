<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralForge</title>
  <link id="dynFavicon" rel="icon" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
    }

    .log-line.info {
      color: var(--bs-teal);
    }

    .log-line.warn {
      color: var(--bs-warning);
    }

    .log-line.err {
      color: var(--bs-danger);
    }

    .model-card {
      transition: border-color 0.2s, box-shadow 0.2s;
      color: var(--bs-body-color) !important;
    }

    .model-card:hover:not(:disabled) {
      border-color: var(--bs-primary) !important;
      background-color: transparent !important;
      box-shadow: 0 0 0 1px var(--bs-primary);
    }

    .model-card.active {
      border-color: var(--bs-success) !important;
      background-color: transparent !important;
      box-shadow: 0 0 0 1px var(--bs-success);
    }

    .model-card:disabled {
      cursor: not-allowed;
    }

    .run-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bs-secondary);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .run-dot.live {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.25), 0 0 10px rgba(34, 197, 94, 0.5);
    }

    #aliasGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    [x-cloak] {
      display: none !important;
    }

    .hf-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 1050;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .help-icon {
      font-size: 0.7rem;
      opacity: 0.55;
      cursor: help;
      vertical-align: middle;
      margin-left: 3px;
    }

    .help-icon:hover {
      opacity: 1;
    }
  </style>
</head>

<body x-data>

  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3 py-2">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-cpu-fill text-success" style="font-size:1.4rem"></i>
      <span class="fw-bold fs-5 text-success">NeuralForge</span>
    </div>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <!-- GPU/CPU mini-stats -->
      <div class="d-flex align-items-center gap-3 border-secondary"
        style="font-size:0.65rem;line-height:1.3">
        <div id="gpuStat" style="min-width:54px">
          <div class="d-flex justify-content-between mb-1"><span class="text-secondary">GPU</span><span
              id="gpuBusyVal">—</span></div>
          <div class="progress" style="height:3px">
            <div class="progress-bar" id="gpuBusyBar" role="progressbar" style="width:0%"></div>
          </div>
        </div>
        <div id="cpuStat" style="min-width:54px">
          <div class="d-flex justify-content-between mb-1"><span class="text-secondary">CPU</span><span
              id="cpuBusyVal">—</span></div>
          <div class="progress" style="height:3px">
            <div class="progress-bar" id="cpuBusyBar" role="progressbar" style="width:0%"></div>
          </div>
        </div>
        <div style="min-width:80px">
          <div class="d-flex justify-content-between mb-1"><span class="text-secondary">GTT</span><span
              id="gttVal">—</span></div>
          <div class="progress" style="height:3px">
            <div class="progress-bar bg-success" id="gttBar" role="progressbar" style="width:0%"></div>
          </div>
        </div>
        <div style="min-width:72px">
          <div class="d-flex justify-content-between mb-1"><span class="text-secondary">Disk</span><span
              id="diskVal">—</span></div>
          <div class="progress" style="height:3px">
            <div class="progress-bar bg-warning" id="diskBar" role="progressbar" style="width:0%"></div>
          </div>
        </div>
        <button class="btn btn-outline-secondary btn-sm" @click="$store.nf.openHFModal()"
          title="Add model from HuggingFace">🤗</button>
        <!-- <a class="btn btn-outline-secondary btn-sm" href="http://neuralforge:3000" target="_blank">Open WebUI</a> -->
      </div>
  </nav>

  <main class="container-fluid px-3 py-3 d-flex flex-column gap-3">

    <!-- Model grid -->
    <div>
      <p class="text-secondary text-uppercase mb-3" style="font-size:0.7rem;letter-spacing:0.1em;font-weight:600">Models
      </p>
      <div id="aliasGrid">
        <!-- active download cards -->
        <template x-for="dl in Object.values($store.nf.hfDownloads)" :key="dl.key">
          <div class="model-card border rounded text-start w-100" style="padding: 1rem 1.1rem"
            :class="dl.error ? 'border-danger' : 'border-primary'">
            <div class="d-flex align-items-center gap-2 mb-3">
              <i class="bi text-primary"
                :class="dl.done ? 'bi-check-circle-fill text-success' : dl.error ? 'bi-x-circle-fill text-danger' : 'bi-download'"></i>
              <span class="fw-semibold text-truncate" style="font-size:0.9rem"
                x-text="dl.filename.split('/').pop()"></span>
            </div>
            <div class="text-secondary mb-3" style="font-size:0.78rem" x-text="dl.repoId"></div>
            <template x-if="!dl.error">
              <div>
                <div class="d-flex justify-content-between mb-1" style="font-size:0.75rem">
                  <span class="text-secondary" x-text="dl.done ? '✓ Complete' : 'Downloading…'"></span>
                  <span :class="dl.done ? 'text-success' : 'text-primary'"
                    x-text="dl.total > 0 ? Math.round(dl.bytes/dl.total*100)+'%' : (dl.bytes > 0 ? fmtBytes(dl.bytes) : '…')"></span>
                </div>
                <div class="progress" style="height:4px">
                  <div class="progress-bar" :class="dl.done ? 'bg-success' : 'bg-primary'"
                    :style="`width:${dl.total > 0 ? Math.round(dl.bytes/dl.total*100) : (dl.done ? 100 : 0)}%`"
                    style="transition:width 0.4s ease"></div>
                </div>
                <div x-show="dl.total > 0 && !dl.done" class="text-secondary mt-1" style="font-size:0.72rem"
                  x-text="fmtBytes(dl.bytes) + ' / ' + fmtBytes(dl.total)"></div>
              </div>
            </template>
            <template x-if="dl.error">
              <div class="text-danger" style="font-size:0.78rem" x-text="'✗ ' + dl.error"></div>
            </template>
          </div>
        </template>

        <template x-for="[alias, info] in Object.entries($store.nf.models.aliases)" :key="alias">
          <div class="model-btn model-card border rounded text-start w-100"
            style="padding: 1rem 1.1rem; border-color: var(--bs-secondary-border-subtle)" :data-alias="alias"
            :class="{ 'border-success active': $store.nf.instances[alias]?.running }">

            <!-- header: dot + name -->
            <div class="d-flex align-items-center gap-2 mb-1">
              <span class="run-dot" :class="{ live: $store.nf.instances[alias]?.running }"></span>
              <span class="fw-semibold" style="font-size:0.95rem" x-text="info.name || alias"></span>
            </div>

            <!-- alias + size + links -->
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="text-secondary" style="font-size:0.75rem;opacity:0.6" x-text="alias"></span>
              <span x-show="info.fileSize" class="text-secondary ms-auto" style="font-size:0.75rem"
                x-text="fmtBytes(info.fileSize)"></span>
              <a x-show="info.hfRepoId" :href="`https://huggingface.co/${info.hfRepoId}`" target="_blank"
                rel="noopener noreferrer" title="Open on HuggingFace" class="text-secondary text-decoration-none"
                style="font-size:0.75rem" @click.stop>↗</a>
              <template x-if="!info.hfRepoId || !info.arch || !info.caps">
                <button :title="info.hfRepoId ? 'Re-sync HuggingFace metadata' : 'Link to HuggingFace repo'"
                  class="btn btn-link btn-sm text-secondary p-0" style="font-size:0.75rem;line-height:1"
                  x-text="info.hfRepoId ? '↻' : '🔗 HF'" @click.stop="$store.nf.syncHF(alias, info)">
                </button>
              </template>
            </div>

            <!-- params -->
            <div class="text-secondary mb-3" style="font-size:0.75rem">
              <span x-text="[
                `ctx ${fmtCtx(info.ctx || 32768)}`,
                `${info.parallel || 2} slots`,
                ...(info.arch ? [info.arch] : []),
                ...(info.pipeline ? [info.pipeline.replace('text-generation','text-gen').replace(/-/g,' ')] : [])
              ].join(' · ')"></span>
              <template x-if="!$store.nf.instances[alias]?.running">
                <span x-data="{ get est() { return $store.nf.estimateGTT(info); } }">
                  <span x-show="est.totalGB > 0" :class="{
                    'text-success':  est.totalGB < ($store.nf.gttTotalGB - $store.nf.gttUsedGB) * 0.9,
                    'text-warning':  est.totalGB >= ($store.nf.gttTotalGB - $store.nf.gttUsedGB) * 0.9 && est.totalGB < ($store.nf.gttTotalGB - $store.nf.gttUsedGB) * 1.1,
                    'text-danger':   est.totalGB >= ($store.nf.gttTotalGB - $store.nf.gttUsedGB) * 1.1,
                    'text-secondary': $store.nf.gttTotalGB === 0
                  }" x-text="' · ~' + est.totalGB.toFixed(1) + ' GB'" :title="`weights ${est.weightsGB.toFixed(1)} GB + KV cache ~${est.kvGB.toFixed(1)} GB`"></span>
                </span>
              </template>
            </div>

            <!-- caps badges -->
            <template x-if="info.caps && info.caps.length">
              <div class="d-flex flex-wrap gap-1 mb-3">
                <template x-for="cap in info.caps" :key="cap">
                  <span class="badge text-bg-secondary" style="font-size:0.68rem" x-text="cap"></span>
                </template>
              </div>
            </template>

            <!-- autoload toggle -->
            <div class="d-flex align-items-center gap-2 mb-3" style="font-size:0.78rem" @click.stop>
              <input type="checkbox" class="form-check-input mt-0" :id="`autoload-${alias}`"
                style="width:13px;height:13px;cursor:pointer" :checked="info.autoLoad"
                @change="$store.nf.setAutoLoad(alias, $event.target.checked, $event.target)">
              <label :for="`autoload-${alias}`" class="text-secondary mb-0" style="cursor:pointer">autoload on
                start</label>
            </div>

            <!-- load + delete buttons (shown when not running) -->
            <template x-if="!$store.nf.instances[alias]?.running">
              <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-success flex-grow-1" style="font-size:0.78rem"
                  :title="`Load ${alias}`" @click.stop="$store.nf.confirmStart(alias, info.name)"><i
                    class="bi bi-play-fill"></i> Load</button>
                <button class="btn btn-sm btn-outline-secondary" style="font-size:0.78rem" title="Edit model params"
                  @click.stop="$store.nf.openEdit(alias, info)"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" style="font-size:0.78rem" title="Delete model"
                  @click.stop="$store.nf.deleteModel(alias, info.name)"><i class="bi bi-trash"></i></button>
              </div>
            </template>

            <!-- runtime info (shown when running) -->
            <template x-if="$store.nf.instances[alias]?.running">
              <div class="mt-3 pt-3 border-top border-secondary">
                <div class="d-flex gap-3 text-secondary mb-2" style="font-size:0.78rem">
                  <span x-text="`up ${fmtUptime($store.nf.instances[alias]?.uptime || 0)}`"></span>
                  <span x-show="$store.nf.instances[alias]?.metrics?.tps"
                    x-text="`${$store.nf.instances[alias]?.metrics?.tps} t/s`"></span>
                  <span x-show="$store.nf.instances[alias]?.metrics?.processing != null"
                    x-text="`${$store.nf.instances[alias]?.metrics?.processing} req`"></span>
                  <span class="ms-auto text-secondary" style="font-size:0.72rem"
                    x-text="`pid ${$store.nf.instances[alias]?.pid || '—'}`"></span>
                </div>
                <div class="d-flex gap-3 mb-2" style="font-size:0.78rem">
                  <a :href="`http://neuralforge:${$store.nf.instances[alias]?.port}`"
                    class="text-success text-decoration-none" target="_blank" @click.stop
                    x-text="`→ :${$store.nf.instances[alias]?.port}`"></a>
                  <a :href="`http://neuralforge:${$store.nf.instances[alias]?.port}/docs`"
                    class="text-secondary text-decoration-none" target="_blank" @click.stop>API docs</a>
                </div>
                <button class="card-stop-btn btn btn-sm btn-outline-danger w-100" style="font-size:0.78rem"
                  :title="`Stop ${alias}`" @click.stop="$store.nf.stopInstance(alias, $event.target)"><i
                    class="bi bi-stop-fill"></i> Stop</button>
              </div>
            </template>

          </div>
        </template>
      </div>

      <!-- Discovered models section -->
      <div class="mt-4" x-show="$store.nf.discoveredExtra.length > 0" x-cloak>
        <p class="text-secondary small mb-2">Discovered (not in models.json)</p>
        <div class="d-flex flex-wrap gap-2">
          <template x-for="m in $store.nf.discoveredExtra" :key="m.path">
            <button class="btn btn-outline-secondary btn-sm" :title="m.path"
              @click="alert('Discovered models: add to models.json aliases to use them.')">
              <span class="small text-secondary" x-text="m.name"></span>
            </button>
          </template>
        </div>
      </div>
    </div>

    <!-- HuggingFace active downloads (kept for loadHFDownloads compat) -->
    <div id="hfActiveDownloads" style="display:none"></div>

    <!-- Server log -->
    <div class="card bg-dark border-secondary" x-data="{ logH: 200 }" :style="`height:${logH}px;display:flex;flex-direction:column`">
      <div class="card-body d-flex flex-column p-2" style="min-height:0">
        <div class="d-flex align-items-center mb-2 px-1">
          <h6 class="card-subtitle text-secondary text-uppercase small mb-0 me-auto">Server Log</h6>
          <button class="btn btn-sm btn-link text-secondary p-0 lh-1 text-decoration-none" style="font-size:1rem;width:22px" title="Shrink log" @click="logH = Math.max(80, logH - 80)">−</button>
          <button class="btn btn-sm btn-link text-secondary p-0 lh-1 ms-1 text-decoration-none" style="font-size:1rem;width:22px" title="Grow log" @click="logH = Math.min(900, logH + 80)">+</button>
        </div>
        <div class="border border-secondary rounded p-2 flex-grow-1 overflow-auto" id="logBody">
          <div id="logInner"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Edit Model Modal -->
  <div class="hf-backdrop" x-show="$store.nf.editModal.open" x-cloak
    @keydown.escape.window="$store.nf.editModal.open = false" @click.self="$store.nf.editModal.open = false">
    <div class="bg-dark border border-secondary rounded p-4"
      style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:1rem">

      <div class="d-flex align-items-center justify-content-between">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-pencil me-2"></i>Edit Model Params</h6>
        <button class="btn-close btn-close-white btn-sm" @click="$store.nf.editModal.open = false"></button>
      </div>

      <div class="text-secondary" style="font-size:0.78rem" x-text="$store.nf.editModal.alias"></div>

      <div class="d-flex flex-column gap-3">
        <div>
          <label class="form-label text-secondary mb-1" style="font-size:0.75rem">Display name <i
              class="bi bi-question-circle help-icon" title="Human-readable label shown in the dashboard."></i></label>
          <input id="editModalName" type="text" class="form-control form-control-sm bg-dark text-light border-secondary"
            x-model="$store.nf.editModal.name" @keydown.enter="$store.nf.saveEdit()" maxlength="120">
        </div>
        <!-- row 1: ctx + parallel -->
        <div class="d-flex gap-3">
          <div class="flex-grow-1">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">Context size <i
                class="bi bi-question-circle help-icon"
                title="Maximum token window (prompt + output). Larger = more GTT memory. 32k is a safe default; 131k needs ~20 GB extra GTT over 32k."></i></label>
            <select class="form-select form-select-sm bg-dark text-light border-secondary"
              x-model.number="$store.nf.editModal.ctx">
              <option value="2048">2 048</option>
              <option value="4096">4 096</option>
              <option value="8192">8 192</option>
              <option value="16384">16 384</option>
              <option value="32768">32 768</option>
              <option value="65536">65 536</option>
              <option value="131072">131 072</option>
            </select>
          </div>
          <div style="width:100px">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">Parallel slots <i
                class="bi bi-question-circle help-icon"
                title="How many simultaneous requests can be in-flight. Each slot reserves (ctx × kv_size) GTT. 2–3 is usually right; more slots = more memory, not more speed."></i></label>
            <input type="number" min="1" max="32"
              class="form-control form-control-sm bg-dark text-light border-secondary"
              x-model.number="$store.nf.editModal.parallel">
          </div>
        </div>

        <!-- row 2: GPU layers + batch size + ubatch size -->
        <div class="d-flex gap-3">
          <div class="flex-grow-1">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">GPU layers <i
                class="bi bi-question-circle help-icon"
                title="Number of transformer layers to offload to the GPU (GTT memory). 999 = offload everything. Lower this if the model OOMs — each layer removed saves a few hundred MB GTT and falls back to CPU."></i></label>
            <input type="number" min="0" max="999"
              class="form-control form-control-sm bg-dark text-light border-secondary"
              x-model.number="$store.nf.editModal.gpuLayers">
          </div>
          <div class="flex-grow-1">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">Batch (-b) <i
                class="bi bi-question-circle help-icon"
                title="Logical batch: max tokens bundled into one prefill pass across all slots. Larger = faster TTFT on long prompts but one request can monopolize the GPU for that burst. 512 keeps things fair across models."></i></label>
            <input type="number" min="32" max="65536" step="256"
              class="form-control form-control-sm bg-dark text-light border-secondary"
              x-model.number="$store.nf.editModal.batchSize">
          </div>
          <div class="flex-grow-1">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">µBatch (-ub) <i
                class="bi bi-question-circle help-icon"
                title="Physical micro-batch: actual GPU kernel chunk size, must be ≤ batch. Smaller = more frequent scheduling between parallel slots and other running models. 512 is the sweet spot for multi-model fairness."></i></label>
            <input type="number" min="32" max="65536" step="256"
              class="form-control form-control-sm bg-dark text-light border-secondary"
              x-model.number="$store.nf.editModal.ubatchSize">
          </div>
        </div>

        <!-- row 3: KV cache types + flash attn -->
        <div class="d-flex gap-3 align-items-end">
          <div class="flex-grow-1">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">KV cache K type <i
                class="bi bi-question-circle help-icon"
                title="Quantisation of the Key half of the attention KV cache. q8_0 cuts memory ~50% vs f16 with negligible quality loss. q4_0 cuts it ~75% with a small but noticeable quality hit on long contexts."></i></label>
            <select class="form-select form-select-sm bg-dark text-light border-secondary"
              x-model="$store.nf.editModal.cacheTypeK">
              <option value="f16">f16 — full precision</option>
              <option value="q8_0">q8_0 — ~½ GTT ⭐</option>
              <option value="q5_0">q5_0</option>
              <option value="q4_0">q4_0 — smallest</option>
            </select>
          </div>
          <div class="flex-grow-1">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">KV cache V type <i
                class="bi bi-question-circle help-icon"
                title="Quantisation of the Value half of the attention KV cache. Recommended to keep K and V the same type. V is slightly more sensitive to quantisation errors than K."></i></label>
            <select class="form-select form-select-sm bg-dark text-light border-secondary"
              x-model="$store.nf.editModal.cacheTypeV">
              <option value="f16">f16 — full precision</option>
              <option value="q8_0">q8_0 — ~½ GTT ⭐</option>
              <option value="q5_0">q5_0</option>
              <option value="q4_0">q4_0 — smallest</option>
            </select>
          </div>
          <div>
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">Flash attn <i
                class="bi bi-question-circle help-icon"
                title="Flash Attention 2: rewrites the attention kernel to use much less memory and run faster, especially at long contexts. Safe to leave on for nearly all models. Disable if you see NaN/garbage output."></i></label>
            <div class="form-check form-switch mb-0 pt-1">
              <input class="form-check-input" type="checkbox" id="editFlashAttn"
                x-model="$store.nf.editModal.flashAttn">
            </div>
          </div>
          <!-- thinking select -->
          <div class="flex-grow-1">
            <label class="form-label text-secondary mb-1" style="font-size:0.75rem">Thinking <i
                class="bi bi-question-circle help-icon"
                title="Qwen3 models can emit a hidden chain-of-thought before answering (enable_thinking). On = always think (slower, smarter). Off = skip thinking (faster, good for code/autocomplete). Default = let the client decide per-request."></i></label>
            <select class="form-select form-select-sm bg-dark text-light border-secondary"
              :value="$store.nf.editModal.enableThinking === null ? 'default' : ($store.nf.editModal.enableThinking ? 'on' : 'off')"
              @change="$store.nf.editModal.enableThinking = $event.target.value === 'default' ? null : $event.target.value === 'on'">
              <option value="default">Default (client decides)</option>
              <option value="on">On (always think)</option>
              <option value="off">Off (skip thinking)</option>
            </select>
          </div>
        </div>
      </div>

      <div x-show="$store.nf.editModal.error" class="text-danger small" x-text="$store.nf.editModal.error"></div>
      <p class="text-secondary mb-0" style="font-size:0.72rem">Changes apply on next model load.</p>

      <div class="d-flex gap-2 justify-content-end">
        <button class="btn btn-sm btn-outline-secondary" @click="$store.nf.editModal.open = false">Cancel</button>
        <button class="btn btn-sm btn-success" @click="$store.nf.saveEdit()"
          :disabled="$store.nf.editModal.saving || !$store.nf.editModal.name.trim()">
          <span x-show="!$store.nf.editModal.saving">Save</span>
          <span x-show="$store.nf.editModal.saving">Saving…</span>
        </button>
      </div>
    </div>
  </div>

  <!-- HF Add Modal -->
  <div class="hf-backdrop" x-show="$store.nf.hfModal.open" x-cloak
    @keydown.escape.window="$store.nf.hfModal.open = false" @click.self="$store.nf.hfModal.open = false">
    <div class="bg-dark border border-secondary rounded p-4"
      style="width:100%;max-width:540px;max-height:80vh;display:flex;flex-direction:column;gap:1rem">

      <div class="d-flex align-items-center justify-content-between">
        <h6 class="mb-0 fw-semibold">🤗 Add from HuggingFace</h6>
        <button class="btn-close btn-close-white btn-sm" @click="$store.nf.hfModal.open = false"></button>
      </div>

      <div class="d-flex gap-2">
        <input id="hfModalInput" type="text" class="form-control form-control-sm bg-dark text-light border-secondary"
          placeholder="https://huggingface.co/unsloth/Qwen3-30B-A3B-GGUF  or  owner/repo"
          x-model="$store.nf.hfModal.input" @keydown.enter="$store.nf.hfFetch()"
          :disabled="$store.nf.hfModal.loading || $store.nf.hfModal.downloading">
        <button class="btn btn-sm btn-outline-secondary flex-shrink-0" @click="$store.nf.hfFetch()"
          :disabled="!$store.nf.hfModal.input.trim() || $store.nf.hfModal.loading || $store.nf.hfModal.downloading">
          <span x-show="!$store.nf.hfModal.loading">Find Files</span>
          <span x-show="$store.nf.hfModal.loading">…</span>
        </button>
      </div>

      <div x-show="$store.nf.hfModal.error" class="text-danger small" x-text="$store.nf.hfModal.error"></div>

      <template x-if="$store.nf.hfModal.files && $store.nf.hfModal.files.length">
        <div style="overflow-y:auto;flex:1;min-height:0;display:flex;flex-direction:column;gap:0.75rem">

          <!-- quant cheat sheet -->
          <details style="font-size:0.72rem">
            <summary class="text-secondary" style="cursor:pointer;user-select:none">What do these formats mean? <i
                class="bi bi-info-circle"></i></summary>
            <div class="mt-2 rounded border border-secondary p-2 d-flex flex-column gap-1"
              style="font-size:0.71rem;line-height:1.5">
              <div class="d-flex gap-2"><span style="min-width:72px;color:#dc3545">Q2 / IQ2</span><span
                  class="text-secondary">~2 bits — smallest files, biggest quality loss</span></div>
              <div class="d-flex gap-2"><span style="min-width:72px;color:#fd7e14">Q3 / IQ3</span><span
                  class="text-secondary">~3 bits — very small, noticeable quality hit</span></div>
              <div class="d-flex gap-2"><span style="min-width:72px;color:#7ecb7e">Q4_K_M ⭐</span><span
                  class="text-secondary">~4 bits — <strong>sweet spot</strong>: good quality, reasonable size</span>
              </div>
              <div class="d-flex gap-2"><span style="min-width:72px;color:#20c997">Q5_K_M</span><span
                  class="text-secondary">~5 bits — better quality, somewhat larger</span></div>
              <div class="d-flex gap-2"><span style="min-width:72px;color:#4dabce">Q6_K</span><span
                  class="text-secondary">~6 bits — near-lossless quality</span></div>
              <div class="d-flex gap-2"><span style="min-width:72px;color:#4dabce">Q8_0</span><span
                  class="text-secondary">~8 bits — essentially indistinguishable from full precision</span></div>
              <div class="d-flex gap-2"><span style="min-width:72px;color:#adb5bd">BF16 / F16</span><span
                  class="text-secondary">Full 16-bit precision — largest files, max quality</span></div>
              <hr class="border-secondary my-1">
              <div class="d-flex gap-2"><span style="min-width:72px" class="text-secondary">_S / _M / _L</span><span
                  class="text-secondary">Within a bit-level: S=smaller, M=balanced, L=larger (better quality)</span>
              </div>
              <div class="d-flex gap-2"><span style="min-width:72px" class="text-secondary">sharded</span><span
                  class="text-secondary">Split across multiple files — not directly downloadable here</span></div>
            </div>
          </details>

          <p class="text-secondary mb-0" style="font-size:0.75rem"
            x-text="`${$store.nf.hfModal.files.length} GGUF files in ${$store.nf.hfModal.repoId} — click to select:`">
          </p>
          <div class="d-flex flex-column gap-1">
            <template x-for="f in $store.nf.hfModal.files" :key="f.name">
              <div class="d-flex align-items-center justify-content-between rounded px-2 py-2 border"
                :style="f.shard ? 'opacity:0.45;cursor:not-allowed' : 'cursor:pointer'" style="font-size:0.8rem"
                :class="$store.nf.hfModal.selected?.name === f.name ? 'border-success bg-success bg-opacity-10' : 'border-secondary'"
                @click="!f.shard && ($store.nf.hfModal.selected = f)">
                <div class="d-flex align-items-center gap-2 overflow-hidden">
                  <span class="fw-semibold flex-shrink-0"
                    :style="`min-width:60px;font-size:0.75rem;color:${f.quantColor}`" x-text="f.quant || '—'"></span>
                  <span class="text-truncate" :class="f.shard ? 'text-secondary' : ''"
                    x-text="f.name.split('/').pop()"></span>
                  <span x-show="f.shard" class="flex-shrink-0 badge text-bg-secondary"
                    style="font-size:0.6rem">sharded</span>
                  <span x-show="f.recommended" class="flex-shrink-0" style="font-size:0.75rem"
                    title="Recommended sweet spot">⭐</span>
                </div>
                <span class="flex-shrink-0 ms-3 fw-semibold" x-show="f.size"
                  style="font-size:0.75rem;color:var(--bs-body-color)" x-text="fmtBytes(f.size)"></span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <template x-if="$store.nf.hfModal.selected">
        <button class="btn btn-success btn-sm w-100" @click="$store.nf.hfDownload()"
          :disabled="$store.nf.hfModal.downloading">
          <i class="bi bi-download me-1"></i>
          <span x-show="!$store.nf.hfModal.downloading"
            x-text="`Download ${$store.nf.hfModal.selected.name.split('/').pop()}`"></span>
          <span x-show="$store.nf.hfModal.downloading">Starting…</span>
        </button>
      </template>

    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
