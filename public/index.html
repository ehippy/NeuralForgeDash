<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralForge</title>
<link id="dynFavicon" rel="icon" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background-color: #0d0d0f; color: #e8e8f0; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
  .text-teal { color: #00d4aa !important; }
  .text-teal-dim { color: #888899 !important; }
  .font-10 { font-size: 10px; }
  .font-11 { font-size: 11px; }
  .font-12 { font-size: 12px; }
  .font-14 { font-size: 14px; }
  .letter-spacing { letter-spacing: 0.15em; text-transform: uppercase; }
  .log-body { overflow-y: auto; font-size: 11px; line-height: 1.6; }
  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line.info { color: #00d4aa; }
  .log-line.warn { color: #ffa502; }
  .log-line.err { color: #ff4757; }
  .overlay { display: none; position: fixed; inset: 0; background-color: rgba(0,0,0,0.7); z-index: 100; }
  .overlay.open { display: flex; align-items: center; justify-content: center; }
  .dialog { background-color: #141418; border: 1px solid #2a2a35; border-radius: 10px; padding: 24px; max-width: 340px; width: 90%; }
  #aliasGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
  .model-card { background: transparent; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px 12px; cursor: pointer; text-align: left; transition: border-color 0.15s; width: 100%; }
  .model-card:hover:not(:disabled) { border-color: #444455; }
  .model-card.active { border-color: #00d4aa; }
  .model-card.last-active { border-color: #555566; }
  .model-card:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-teal { background-color: #00d4aa; border-color: #00d4aa; color: #0d0d0f; }
  .btn-teal:hover { background-color: #00b894; border-color: #00b894; color: #0d0d0f; }
</style>
</head>
<body>

<header class="bg-dark border-secondary border-bottom d-flex align-items-center justify-content-between px-3 py-2">
  <div class="d-flex align-items-center gap-2">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:22px;height:22px;color:#00d4aa">
      <polygon points="12,2 22,7 22,17 12,22 2,17 2,7"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <span class="text-teal fw-bold" style="font-size:16px;letter-spacing:0.05em">NeuralForge</span>
  </div>
  <div class="d-flex align-items-center gap-3">
    <div class="badge" id="statusBadge">
      <div class="dot me-2" id="statusDot"></div>
      <span id="statusText">CONNECTING...</span>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary btn-sm" href="http://localhost:3000" target="_blank">Open WebUI</a>
    </div>
  </div>
</header>

<main class="container-fluid px-4 py-3 d-flex flex-column gap-3" style="max-height:100vh">
  <div class="bg-dark border border-secondary rounded-3 p-3">
    <div class="font-10 letter-spacing text-secondary mb-3">Switch Model</div>
    <div id="aliasGrid"></div>
    <div class="mt-3" id="discoveredSection" style="display:none">
      <div class="font-10 text-secondary mb-2">Discovered</div>
      <div class="d-flex flex-wrap gap-2" id="discoveredGrid"></div>
    </div>
  </div>

  <div class="bg-dark border border-secondary rounded-3 p-3">
    <div class="d-flex justify-content-between align-items-center" style="cursor:pointer" onclick="toggleHFPanel()">
      <div class="font-10 letter-spacing text-secondary">HuggingFace Hub</div>
      <span id="hfToggleIcon" class="font-11 text-secondary" style="transition:transform 0.2s">▶</span>
    </div>
    <div id="hfPanel" style="display:none; margin-top:12px">
      <div class="d-flex gap-2 mb-2">
        <input type="text" id="hfSearchInput" class="form-control form-control-sm bg-dark border-secondary text-light"
          placeholder="Search GGUF models on HuggingFace…" autocomplete="off" style="font-size:11px">
      </div>
      <div id="hfResults" class="d-flex flex-column gap-1" style="max-height:280px;overflow-y:auto"></div>
      <div id="hfActiveDownloads" class="d-flex flex-column gap-2"></div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12 col-lg-4">
      <div class="bg-dark border border-secondary rounded-3 p-3">
        <div class="font-10 letter-spacing text-secondary mb-3">GPU</div>
        <div class="mb-3">
          <div class="d-flex justify-content-between font-11 mb-1">
            <span class="text-secondary">Busy</span>
            <span class="font-11" id="gpuBusyVal">—</span>
          </div>
          <div class="progress mb-2"><div class="progress-bar" id="gpuBusyBar" role="progressbar" style="width:0%"></div></div>
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between font-11 mb-1">
            <span class="text-secondary">GTT Memory</span>
            <span class="font-11" id="gttVal">—</span>
          </div>
          <div class="progress mb-2"><div class="progress-bar bg-success" id="gttBar" role="progressbar" style="width:0%"></div></div>
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between font-11 mb-1">
            <span class="text-secondary">VRAM</span>
            <span class="font-11" id="vramVal">—</span>
          </div>
          <div class="progress mb-2"><div class="progress-bar" id="vramBar" role="progressbar" style="width:0%"></div></div>
        </div>
        <div class="d-flex justify-content-between font-11 mb-1">
          <span class="text-secondary">Clock</span>
          <span class="font-11" id="gpuClock">—</span>
        </div>
        <div class="d-flex justify-content-between font-11">
          <span class="text-secondary">CPU Temp</span>
          <span class="font-11" id="cpuTemp">—</span>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-4">
      <div class="bg-dark border border-secondary rounded-3 p-3">
        <div class="font-10 letter-spacing text-secondary mb-3">RUNNING MODELS</div>
        <div id="instanceList"><span class="font-11 text-secondary">—</span></div>
      </div>
    </div>

    <div class="col-12 col-lg-4">
      <div class="bg-dark border border-secondary rounded-3 p-3">
        <div class="font-10 letter-spacing text-secondary mb-3">READY TO WORK</div>
        <div class="font-11 text-secondary">
          <div id="readyList"><span class="font-11 text-secondary">—</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="bg-dark border border-secondary rounded-3 p-3" style="height:200px; display:flex; flex-direction:column">
    <div class="font-10 letter-spacing text-secondary mb-2">Server Log</div>
    <div class="log-body bg-dark border border-secondary rounded p-2" style="flex:1; overflow-y:auto" id="logBody">
      <div id="logInner"></div>
    </div>
  </div>
</main>

<div class="overlay" id="confirmOverlay">
  <div class="dialog">
    <h3 class="font-14 mb-3">Load Model</h3>
    <p class="font-12 mb-4 text-secondary" id="confirmText"></p>
    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-teal btn-sm" id="confirmBtn">Load</button>
    </div>
  </div>
</div>

<script>
// instances: { alias: { running, alias, model, pid, port, uptime, switching, healthy, metrics } }
let instances = {};
let models = { aliases: {}, discovered: [] };
let pendingAlias = null;
const uptimeTimers = new Map(); // alias -> intervalId
const MAX_LOG_LINES = 200;

// ── Reactive favicon sparkline ────────────────────────────────────────────────
const _fvCanvas = Object.assign(document.createElement('canvas'), { width: 32, height: 32 });
const _fvCtx = _fvCanvas.getContext('2d');
const _fvHist = { busy: [], gtt: [] };
const _fvLen = 20;

function drawFavicon(busyPct, gttPct) {
  if (busyPct != null) { _fvHist.busy.push(busyPct); if (_fvHist.busy.length > _fvLen) _fvHist.busy.shift(); }
  if (gttPct  != null) { _fvHist.gtt.push(gttPct);   if (_fvHist.gtt.length  > _fvLen) _fvHist.gtt.shift(); }

  const ctx = _fvCtx, W = 32, H = 32, pad = 2;
  const pw = W - pad * 2, ph = H - pad * 2;
  ctx.clearRect(0, 0, W, H);

  // Dark background with rounded corners
  ctx.fillStyle = '#141418';
  ctx.beginPath(); ctx.roundRect(0, 0, W, H, 5); ctx.fill();

  function plot(data, color, fillAlpha) {
    const n = data.length;
    if (n < 2) return;
    const pts = data.map((v, i) => [
      pad + (i / (n - 1)) * pw,
      pad + ph - Math.min(100, Math.max(0, v)) / 100 * ph
    ]);
    ctx.save();
    // Filled area
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pad + ph);
    pts.forEach(([x, y]) => ctx.lineTo(x, y));
    ctx.lineTo(pts[pts.length - 1][0], pad + ph);
    ctx.closePath();
    ctx.fillStyle = color; ctx.globalAlpha = fillAlpha; ctx.fill(); ctx.globalAlpha = 1;
    // Crisp line on top
    ctx.beginPath();
    pts.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
  }

  plot(_fvHist.gtt,  '#ff9f43', 0.35); // GTT: amber (behind)
  plot(_fvHist.busy, '#00d4aa', 0.35); // GPU busy: teal (front)

  document.getElementById('dynFavicon').href = _fvCanvas.toDataURL();
}

async function init() {
  await loadModels();
  await refresh();
  await loadLogs();
  connectSSE();
  setInterval(loadLogs, 2000);
}

async function loadModels() {
  try {
    const r = await fetch('/api/models');
    models = await r.json();
    renderModelButtons();
  } catch(e) { console.error('models load failed', e); }
}

async function refresh() {
  try {
    const [statusR, gpuR] = await Promise.all([fetch('/api/status'), fetch('/api/gpu')]);
    const statusData = await statusR.json();
    const gpu = await gpuR.json();
    updateInstances(statusData.instances || {});
    updateGpu(gpu);
  } catch {}
}

function renderLogs(lines) {
  const inner = document.getElementById('logInner');
  inner.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (const line of lines) {
    let cls = 'log-line';
    if (/error|fail|fatal/i.test(line)) cls += ' err';
    else if (/warn/i.test(line)) cls += ' warn';
    else if (/neuralforge|listen|ready|done/i.test(line)) cls += ' info';
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = line;
    frag.appendChild(div);
  }
  inner.appendChild(frag);
  const body = document.getElementById('logBody');
  body.scrollTop = body.scrollHeight;
}

async function loadLogs() {
  try {
    const r = await fetch('/api/logs');
    const data = await r.json();
    renderLogs(data.lines);
  } catch {}
}

function connectSSE() {
  const es = new EventSource('/events');
  es.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'update') {
      updateInstances(data.statuses || {});
      updateGpu(data.gpu);
    } else if (data.type === 'switching') {
      // Mark the specific alias as switching while it loads
      instances[data.alias] = { ...(instances[data.alias] || {}), switching: true, alias: data.alias };
      updateModelButtonStates();
      updateStatusBadge();
    } else if (data.type === 'started') {
      refresh();
      loadModels();
    } else if (data.type === 'stopped') {
      delete instances[data.alias];
      stopUptimeTimer(data.alias);
      updateModelButtonStates();
      updateStatusBadge();
      renderInstanceList();
      renderReadyPanel();
      loadLogs();
    } else if (data.type === 'hf-progress') {
      updateHFProgress(data.key, data.bytes, data.total);
    } else if (data.type === 'hf-done') {
      onHFDone(data.key, data.alias);
      loadModels();
    } else if (data.type === 'hf-error') {
      onHFError(data.key, data.error);
    }
  };
  es.onerror = () => setTimeout(connectSSE, 5000);
}

function updateInstances(newStatuses) {
  // Merge in new statuses; preserve local switching flags for in-flight starts.
  for (const [alias, st] of Object.entries(newStatuses)) {
    const prev = instances[alias] || {};
    instances[alias] = { ...st, metrics: st.metrics || prev.metrics };
  }
  // Remove instances that are no longer running and not switching
  for (const alias of Object.keys(instances)) {
    if (!newStatuses[alias] && !instances[alias].switching) {
      delete instances[alias];
      stopUptimeTimer(alias);
    }
  }
  // Sync uptime timers
  for (const [alias, st] of Object.entries(instances)) {
    if (st.running && !uptimeTimers.has(alias)) {
      uptimeTimers.set(alias, setInterval(() => {
        if (instances[alias]) instances[alias].uptime = (instances[alias].uptime || 0) + 1;
        renderInstanceList();
      }, 1000));
    } else if (!st.running) {
      stopUptimeTimer(alias);
    }
  }
  updateStatusBadge();
  updateModelButtonStates();
  renderInstanceList();
  renderReadyPanel();
}

function stopUptimeTimer(alias) {
  if (uptimeTimers.has(alias)) {
    clearInterval(uptimeTimers.get(alias));
    uptimeTimers.delete(alias);
  }
}

function updateStatusBadge() {
  const badge = document.getElementById('statusBadge');
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  badge.className = 'badge';
  dot.className = 'dot';

  const allInstances = Object.values(instances);
  const anySwitching = allInstances.some(s => s.switching);
  const runningList = allInstances.filter(s => s.running);

  if (anySwitching) {
    badge.style.borderColor = '#ffa502';
    badge.style.color = '#ffa502';
    dot.classList.add('pulse');
    text.textContent = 'LOADING...';
  } else if (runningList.length > 0) {
    badge.style.borderColor = '#00d4aa';
    badge.style.color = '#00d4aa';
    text.textContent = runningList.length === 1
      ? `● ${runningList[0].model || 'RUNNING'}`
      : `● ${runningList.length} RUNNING`;
  } else {
    badge.style.borderColor = '#888899';
    badge.style.color = '#888899';
    text.textContent = 'STOPPED';
  }
}

function renderInstanceList() {
  const el = document.getElementById('instanceList');
  const running = Object.values(instances).filter(s => s.running || s.switching);
  if (running.length === 0) {
    el.innerHTML = '<span class="font-11 text-secondary">—</span>';
    return;
  }
  el.innerHTML = '';
  for (const s of running) {
    const row = document.createElement('div');
    row.className = 'mb-2 pb-2';
    row.style.borderBottom = '1px solid #22223a';
    row.innerHTML = [
      `<div class="d-flex justify-content-between font-11 mb-1">`,
        `<span class="text-teal">${s.model || s.alias || '—'}</span>`,
        `<span class="font-10 text-secondary">:${s.port || '?'}</span>`,
      `</div>`,
      `<div class="d-flex gap-3 font-10 text-secondary">`,
        `<span>uptime ${s.switching ? '…' : fmtUptime(s.uptime || 0)}</span>`,
        s.metrics?.tps ? `<span>${s.metrics.tps} t/s</span>` : '',
        s.metrics?.processing != null ? `<span>${s.metrics.processing} reqs</span>` : '',
        `<span>pid ${s.pid || '—'}</span>`,
      `</div>`,
    ].join('');
    el.appendChild(row);
  }
  // Trim last border
  if (el.lastChild) el.lastChild.style.borderBottom = 'none';
}

function renderReadyPanel() {
  const el = document.getElementById('readyList');
  const running = Object.values(instances).filter(s => s.running);
  if (running.length === 0) {
    el.innerHTML = '<span class="font-11 text-secondary">—</span>';
    return;
  }
  el.innerHTML = '';
  for (const s of running) {
    const cfg = models.aliases?.[s.alias] || {};
    const port = s.port;
    const div = document.createElement('div');
    div.className = 'mb-3 pb-2';
    div.style.borderBottom = '1px solid #22223a';
    const lines = [
      `<div class="mb-1 font-11 text-teal">${s.model || s.alias} <span class="font-10 text-secondary">:${port}</span></div>`,
      `<div class="mb-1">Context: <span class="font-11">${fmtCtx(cfg.ctx || 32768)}</span></div>`,
      `<div class="mb-1">GPU layers: <span class="font-11">${cfg.gpuLayers ?? 'auto'}</span></div>`,
      `<div class="mb-1">Parallel: <span class="font-11">${cfg.parallel || 2}</span></div>`,
      `<div class="mb-1">Server: <a href="http://localhost:${port}" class="text-teal text-decoration-none">localhost:${port}</a></div>`,
      `<div>API Docs: <a href="http://localhost:${port}/docs" class="text-teal text-decoration-none">localhost:${port}/docs</a></div>`,
    ];
    div.innerHTML = lines.join('');
    el.appendChild(div);
  }
  if (el.lastChild) el.lastChild.style.borderBottom = 'none';
}

function setBar(barId, valId, displayVal, suffix, usePctForColor, pctOverride) {
  const bar = document.getElementById(barId);
  const val = document.getElementById(valId);
  if (displayVal == null) { val.textContent = '—'; bar.style.width = '0%'; return; }

  const pct = pctOverride !== undefined ? pctOverride : parseFloat(displayVal);
  val.textContent = `${displayVal}${suffix}`;
  bar.style.width = `${Math.min(100, pct)}%`;

  if (usePctForColor || pctOverride !== undefined) {
    bar.className = 'progress-bar' + (pct >= 85 ? ' bg-danger' : pct >= 60 ? ' bg-warning' : ' bg-success');
  }
}

function updateGpu(g) {
  if (!g) return;

  setBar('gpuBusyBar', 'gpuBusyVal', g.busyPct, '%', true);
  setBar('gttBar', 'gttVal', g.gttUsedGB, ` / ${g.gttTotalGB} GB`,
    false, g.gttUsedGB && g.gttTotalGB ? (g.gttUsedGB / g.gttTotalGB) * 100 : 0);
  setBar('vramBar', 'vramVal', g.vramUsedMB, ` / ${g.vramTotalMB} MB`,
    false, g.vramUsedMB && g.vramTotalMB ? (g.vramUsedMB / g.vramTotalMB) * 100 : 0);

  document.getElementById('gpuClock').textContent = g.clockMhz ? `${g.clockMhz} MHz` : '—';
  document.getElementById('cpuTemp').textContent = g.cpuTempC != null ? `${g.cpuTempC.toFixed(0)}°C` : '—';

  const gttPct = g.gttUsedGB && g.gttTotalGB
    ? (parseFloat(g.gttUsedGB) / parseFloat(g.gttTotalGB)) * 100
    : null;
  drawFavicon(g.busyPct, gttPct);
}





function fmtCtx(n) {
  if (!n) return '—';
  if (n >= 1024) return Math.round(n / 1024) + 'k';
  return String(n);
}

function renderModelButtons() {
  const grid = document.getElementById('aliasGrid');
  grid.innerHTML = '';
  for (const [alias, info] of Object.entries(models.aliases)) {
    const card = document.createElement('button');
    card.className = 'model-btn model-card';
    card.dataset.alias = alias;
    card.onclick = () => {
      if (instances[alias]?.running) return; // no-op: already loaded
      confirmStart(alias, info.name);
    };

    // ── top row: dot indicator + alias + start hint + size
    const topRow = document.createElement('div');
    topRow.className = 'd-flex justify-content-between align-items-center mb-1';

    const leftCluster = document.createElement('div');
    leftCluster.className = 'd-flex align-items-center gap-1';
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.cssText = 'width:6px;height:6px;border-radius:50%;background-color:#00d4aa;display:none;flex-shrink:0';
    const aliasEl = document.createElement('span');
    aliasEl.className = 'font-12 fw-semibold';
    aliasEl.textContent = alias;
    const hint = document.createElement('span');
    hint.className = 'start-hint font-10 text-teal';
    hint.style.display = 'none';
    hint.textContent = '▶';
    leftCluster.appendChild(dot);
    leftCluster.appendChild(aliasEl);
    leftCluster.appendChild(hint);

    const rightCluster = document.createElement('div');
    rightCluster.className = 'd-flex align-items-center gap-2';
    if (info.fileSize) {
      const sizeEl = document.createElement('span');
      sizeEl.className = 'font-10 text-secondary';
      sizeEl.textContent = fmtBytes(info.fileSize);
      rightCluster.appendChild(sizeEl);
    }
    if (info.hfRepoId) {
      const hfLink = document.createElement('a');
      hfLink.href = `https://huggingface.co/${info.hfRepoId}`;
      hfLink.target = '_blank';
      hfLink.rel = 'noopener noreferrer';
      hfLink.title = 'Open on HuggingFace';
      hfLink.style.cssText = 'color:#555577;text-decoration:none;line-height:1;font-size:11px';
      hfLink.textContent = '↗';
      hfLink.addEventListener('click', e => e.stopPropagation());
      rightCluster.appendChild(hfLink);
    }

    // ── HF sync / link button
    const needsSync = !info.hfRepoId || !info.arch || !info.caps;
    if (needsSync) {
      const syncBtn = document.createElement('button');
      syncBtn.title   = info.hfRepoId ? 'Re-sync HuggingFace metadata' : 'Link to a HuggingFace repo to backfill metadata';
      syncBtn.style.cssText = 'background:none;border:none;padding:0;cursor:pointer;font-size:11px;color:#555577;line-height:1';
      syncBtn.textContent = info.hfRepoId ? '↻' : '🔗 HF';
      syncBtn.addEventListener('click', async e => {
        e.stopPropagation();
        let repoId = info.hfRepoId;
        if (!repoId) {
          repoId = prompt(`HuggingFace repo ID for "${alias}"\n(e.g. unsloth/Qwen3-30B-A3B-GGUF)`);
          if (!repoId) return;
          repoId = repoId.trim();
        }
        syncBtn.disabled = true;
        const orig = syncBtn.textContent;
        syncBtn.textContent = '…';
        try {
          const r = await fetch('/api/hf/backfill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ alias, repoId }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'backfill failed');
          fetchModels();
        } catch (err) {
          alert(`HF backfill failed: ${err.message}`);
          syncBtn.disabled = false;
          syncBtn.textContent = orig;
        }
      });
      rightCluster.appendChild(syncBtn);
    }

    topRow.appendChild(leftCluster);
    topRow.appendChild(rightCluster);

    // ── model name
    const nameEl = document.createElement('div');
    nameEl.className = 'font-10 text-secondary mb-1';
    nameEl.style.cssText = 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
    nameEl.title = info.name;
    nameEl.textContent = info.name;

    // ── params row: ctx · slots · arch
    const paramEl = document.createElement('div');
    paramEl.className = 'font-10 mb-1';
    paramEl.style.color = '#555577';
    const parts = [`ctx ${fmtCtx(info.ctx || 32768)}`, `${info.parallel || 2} slots`];
    if (info.arch) parts.push(info.arch);
    if (info.pipeline) parts.push(info.pipeline.replace('text-generation', 'text-gen').replace(/-/g, ' '));
    paramEl.textContent = parts.join(' · ');

    // ── per-card stop button (shown when running)
    const stopBtn = document.createElement('button');
    stopBtn.className = 'card-stop-btn font-10';
    stopBtn.title = `Stop ${alias}`;
    stopBtn.style.cssText = 'display:none;background:none;border:1px solid #553333;border-radius:3px;color:#ff6b6b;cursor:pointer;padding:1px 5px;margin-top:4px;width:100%';
    stopBtn.textContent = '■ stop';
    stopBtn.addEventListener('click', async e => {
      e.stopPropagation();
      stopBtn.disabled = true;
      stopBtn.textContent = '…';
      try {
        await fetch('/api/stop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ alias }),
        });
      } catch {}
    });

    // ── autoload toggle row
    const autoRow = document.createElement('div');
    autoRow.style.cssText = 'display:flex;align-items:center;gap:5px;margin-top:5px';
    autoRow.addEventListener('click', e => e.stopPropagation());
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.id = `autoload-${alias}`;
    chk.checked = !!info.autoLoad;
    chk.style.cssText = 'accent-color:#00d4aa;cursor:pointer;width:11px;height:11px';
    chk.addEventListener('change', async () => {
      try {
        const r = await fetch('/api/models/set-autoload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ alias, autoLoad: chk.checked }),
        });
        if (!r.ok) { chk.checked = !chk.checked; }
      } catch { chk.checked = !chk.checked; }
    });
    const chkLabel = document.createElement('label');
    chkLabel.htmlFor = `autoload-${alias}`;
    chkLabel.className = 'font-10';
    chkLabel.style.cssText = 'color:#555577;cursor:pointer;margin:0';
    chkLabel.textContent = 'autoload';
    autoRow.appendChild(chk);
    autoRow.appendChild(chkLabel);

    // ── capability badges
    card.appendChild(topRow);
    card.appendChild(nameEl);
    card.appendChild(paramEl);
    card.appendChild(autoRow);
    card.appendChild(stopBtn);
    if (info.caps && info.caps.length) {
      const capRow = document.createElement('div');
      capRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:3px;margin-top:3px';
      info.caps.forEach(cap => {
        const badge = document.createElement('span');
        badge.className = 'font-10';
        badge.style.cssText = 'background:#1c2230;color:#8ab4d4;border-radius:3px;padding:1px 4px;white-space:nowrap';
        badge.textContent = cap;
        capRow.appendChild(badge);
      });
      card.appendChild(capRow);
    }

    grid.appendChild(card);
  }

  const discGrid = document.getElementById('discoveredGrid');
  const discSection = document.getElementById('discoveredSection');
  const extra = (models.discovered || []).filter(d => {
    return !Object.values(models.aliases).some(a => d.path.endsWith(a.model.replace('~/', '').replace('~', '')));
  });

  if (extra.length > 0) {
    discGrid.innerHTML = '';
    extra.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline-secondary btn-sm';
      btn.innerHTML = `<span class="font-10 text-secondary">${m.name}</span>`;
      btn.title = m.path;
      btn.onclick = () => alert('Discovered models: add to models.json aliases to use them.');
      discGrid.appendChild(btn);
    });
    discSection.style.display = 'block';
  } else {
    discSection.style.display = 'none';
  }
}

function updateModelButtonStates() {
  document.querySelectorAll('.model-btn[data-alias]').forEach(card => {
    const alias = card.dataset.alias;
    const inst = instances[alias];
    const isRunning = inst?.running === true;
    const isSwitching = inst?.switching === true;

    // Only disable the card that is actively loading; others stay clickable.
    card.disabled = isSwitching;
    card.classList.toggle('active', isRunning);
    card.classList.remove('last-active');

    const dot = card.querySelector('.dot');
    if (dot) dot.style.display = isRunning ? 'inline-block' : 'none';
    const hint = card.querySelector('.start-hint');
    if (hint) hint.style.display = 'none';
    const stopBtn = card.querySelector('.card-stop-btn');
    if (stopBtn) stopBtn.style.display = isRunning ? 'block' : 'none';
  });
}

function confirmStart(alias, name) {
  pendingAlias = alias;
  document.getElementById('confirmText').textContent = `Load "${name}"?`;
  document.getElementById('confirmBtn').onclick = doStart;
  document.getElementById('confirmOverlay').classList.add('open');
}

async function doStart() {
  closeConfirm();
  if (!pendingAlias) return;
  // Optimistically mark as switching so the card disables immediately.
  instances[pendingAlias] = { ...(instances[pendingAlias] || {}), switching: true, alias: pendingAlias };
  updateModelButtonStates();
  updateStatusBadge();
  try {
    await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ alias: pendingAlias }),
    });
  } catch(e) {
    console.error(e);
    delete instances[pendingAlias];
    updateModelButtonStates();
    updateStatusBadge();
  }
  pendingAlias = null;
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}



function fmtUptime(s) {
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return `${h}h ${m}m`;
}

init();

// ── HuggingFace Hub ────────────────────────────────────────────────
let hfOpen = false;
let hfSearchTimer = null;
// key → { barEl, labelEl, rowEl }
const hfProgressEls = new Map();

function toggleHFPanel() {
  hfOpen = !hfOpen;
  document.getElementById('hfPanel').style.display = hfOpen ? 'block' : 'none';
  document.getElementById('hfToggleIcon').style.transform = hfOpen ? 'rotate(90deg)' : '';
  if (hfOpen) {
    // Restore any active downloads from server on first open
    loadHFDownloads();
    const inp = document.getElementById('hfSearchInput');
    inp.removeEventListener('input', onHFInput);
    inp.addEventListener('input', onHFInput);
    inp.focus();
  }
}

function onHFInput(e) {
  clearTimeout(hfSearchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { document.getElementById('hfResults').innerHTML = ''; return; }
  hfSearchTimer = setTimeout(() => doHFSearch(q), 420);
}

async function doHFSearch(q) {
  const container = document.getElementById('hfResults');
  container.innerHTML = '<div class="font-11 text-secondary py-1">Searching…</div>';
  try {
    const r = await fetch(`/api/hf/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    renderHFResults(data.models || []);
  } catch {
    container.innerHTML = '<div class="font-11" style="color:#ff4757">Search failed</div>';
  }
}

function renderHFResults(hfModels) {
  const container = document.getElementById('hfResults');
  container.innerHTML = '';
  if (!hfModels.length) {
    container.innerHTML = '<div class="font-11 text-secondary py-1">No results</div>';
    return;
  }
  hfModels.forEach(m => {
    const card = document.createElement('div');
    card.className = 'border border-secondary rounded p-2 mb-1';
    card.style.fontSize = '11px';

    // ── header row: repo name + download/like counts ──────────────────
    const [author, repoName] = m.id.includes('/') ? m.id.split('/') : ['', m.id];
    const header = document.createElement('div');
    header.className = 'd-flex justify-content-between align-items-start';
    header.style.cursor = 'pointer';
    header.style.gap = '8px';

    const nameBlock = document.createElement('div');
    nameBlock.style.minWidth = '0';
    const authorEl = document.createElement('div');
    authorEl.className = 'font-10';
    authorEl.style.color = '#666677';
    authorEl.textContent = author;
    // repo name + external link side by side
    const nameRow = document.createElement('div');
    nameRow.style.cssText = 'display:flex;align-items:center;gap:5px';
    const nameEl = document.createElement('div');
    nameEl.className = 'text-teal fw-semibold';
    nameEl.style.cssText = 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px';
    nameEl.title = m.id;
    nameEl.textContent = repoName || m.id;
    const hfLink = document.createElement('a');
    hfLink.href = `https://huggingface.co/${m.id}`;
    hfLink.target = '_blank';
    hfLink.rel = 'noopener noreferrer';
    hfLink.title = 'Open on HuggingFace';
    hfLink.style.cssText = 'color:#555577;text-decoration:none;flex-shrink:0;line-height:1';
    hfLink.textContent = '↗';
    hfLink.addEventListener('click', e => e.stopPropagation());
    nameRow.appendChild(nameEl);
    nameRow.appendChild(hfLink);
    nameBlock.appendChild(authorEl);
    nameBlock.appendChild(nameRow);

    const statsBlock = document.createElement('div');
    statsBlock.className = 'd-flex flex-column align-items-end gap-1';
    statsBlock.style.flexShrink = '0';
    const dlLikeEl = document.createElement('div');
    dlLikeEl.className = 'font-10';
    dlLikeEl.style.color = '#888899';
    dlLikeEl.textContent = `↓ ${fmtNum(m.downloads ?? 0)}  ♥ ${fmtNum(m.likes ?? 0)}`;
    statsBlock.appendChild(dlLikeEl);
    if (m.totalGgufBytes) {
      const sizeEl = document.createElement('div');
      sizeEl.className = 'font-10 fw-semibold';
      sizeEl.style.color = '#00d4aa';
      sizeEl.textContent = fmtBytes(m.totalGgufBytes) + ' total';
      statsBlock.appendChild(sizeEl);
    }

    // ── tag row: arch + pipeline + age ────────────────────────────────
    const tagRow = document.createElement('div');
    tagRow.className = 'd-flex gap-1 flex-wrap';
    tagRow.style.marginTop = '4px';
    if (m.arch) tagRow.appendChild(hfBadge(m.arch, '#2a3a4a', '#4dabce'));
    if (m.pipeline) {
      const pLabel = m.pipeline.replace(/-/g, ' ').replace('text generation', 'text-gen');
      tagRow.appendChild(hfBadge(pLabel, '#2a2a35', '#888899'));
    }
    if (m.lastModified) {
      tagRow.appendChild(hfBadge('updated ' + fmtAge(m.lastModified), '#1e1e24', '#666677'));
    }
    if (m.quantVariants && m.quantVariants.length) {
      // Show up to 4 quant pills
      m.quantVariants.slice(0, 4).forEach(q =>
        tagRow.appendChild(hfBadge(q, '#1a1a22', quantColor(q)))
      );
      if (m.quantVariants.length > 4)
        tagRow.appendChild(hfBadge(`+${m.quantVariants.length - 4}`, '#1a1a22', '#555577'));
    }
    if (m.caps && m.caps.length) {
      const capRow = document.createElement('div');
      capRow.className = 'd-flex gap-1 flex-wrap';
      capRow.style.marginTop = '3px';
      m.caps.forEach(cap => capRow.appendChild(hfBadge(cap, '#1c2230', '#8ab4d4')));
      card.appendChild(capRow);
    }

    const fileList = document.createElement('div');
    fileList.style.display = 'none';
    fileList.style.marginTop = '6px';

    let loaded = false;
    header.addEventListener('click', async () => {
      const open = fileList.style.display !== 'none';
      fileList.style.display = open ? 'none' : 'block';
      if (!open && !loaded) {
        loaded = true;
        fileList.innerHTML = '<div class="font-10 text-secondary">Loading files…</div>';
        try {
          const r = await fetch(`/api/hf/files?repo=${encodeURIComponent(m.id)}`);
          const data = await r.json();
          renderHFFileList(fileList, m.id, data.files || [], m);
        } catch {
          fileList.innerHTML = '<div class="font-10" style="color:#ff4757">Failed to load files</div>';
        }
      }
    });

    card.appendChild(header);
    card.appendChild(tagRow);
    card.appendChild(fileList);
    container.appendChild(card);
  });
}

function hfBadge(text, bg, color) {
  const s = document.createElement('span');
  s.className = 'font-10';
  s.style.cssText = `background:${bg};color:${color};border-radius:3px;padding:1px 5px;white-space:nowrap`;
  s.textContent = text;
  return s;
}

function fmtAge(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const d = Math.floor(diff / 86400000);
  if (d < 1) return 'today';
  if (d < 7) return `${d}d ago`;
  if (d < 31) return `${Math.floor(d/7)}w ago`;
  if (d < 365) return `${Math.floor(d/30)}mo ago`;
  return `${Math.floor(d/365)}y ago`;
}

// Quant quality tier → color
const QUANT_COLORS = {
  F32:'#aaaacc', BF16:'#aaaacc', F16:'#aaaacc',
  Q8_0:'#4dabce', Q6_K:'#4dabce',
  Q5_K_M:'#00d4aa', Q5_K_S:'#00d4aa', Q5_0:'#00d4aa', Q5_1:'#00d4aa',
  Q4_K_M:'#7ecb7e', Q4_K_S:'#7ecb7e', Q4_0:'#7ecb7e', Q4_1:'#7ecb7e',
  Q3_K_M:'#ffa502', Q3_K_S:'#ffa502', Q3_K_L:'#ffa502',
  Q2_K:'#ff6b6b',
};
function quantColor(q) {
  if (!q) return '#555577';
  if (QUANT_COLORS[q]) return QUANT_COLORS[q];
  if (q.startsWith('IQ')) return '#c084fc';
  if (q.startsWith('Q8')) return '#4dabce';
  if (q.startsWith('Q6')) return '#4dabce';
  if (q.startsWith('Q5')) return '#00d4aa';
  if (q.startsWith('Q4')) return '#7ecb7e';
  if (q.startsWith('Q3')) return '#ffa502';
  if (q.startsWith('Q2')) return '#ff6b6b';
  return '#888899';
}

function renderHFFileList(container, repoId, files, cardMeta = {}) {
  container.innerHTML = '';
  if (!files.length) {
    container.innerHTML = '<div class="font-10 text-secondary">No GGUF files found</div>';
    return;
  }
  // Sort: shards first (skipping shards 2+), then by name
  const visible = files.filter(f => {
    const m = f.name.match(/-([0-9]{5})-of-([0-9]{5})\.gguf$/);
    return !m || m[1] === '00001';
  });
  (visible.length ? visible : files).forEach(f => {
    const isShard = /-[0-9]{5}-of-[0-9]{5}\.gguf$/.test(f.name);
    const row = document.createElement('div');
    row.className = 'd-flex justify-content-between align-items-center py-1 border-top border-secondary gap-2';
    row.style.fontSize = '11px';
    row.id = 'hf-row-' + btoa(repoId + '/' + f.name).replace(/[^a-zA-Z0-9]/g, '');

    const left = document.createElement('div');
    left.style.cssText = 'min-width:0;flex:1;display:flex;align-items:center;gap:6px';

    // quant badge
    const qBadge = document.createElement('span');
    qBadge.className = 'font-10';
    qBadge.style.cssText = `color:${quantColor(f.quant)};font-weight:600;flex-shrink:0;min-width:52px`;
    qBadge.textContent = f.quant || '—';

    // filename (dimmed, truncated)
    const nameEl = document.createElement('span');
    nameEl.style.cssText = 'color:#555577;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1';
    // Show just the unique part — strip the common repo prefix from the name
    const shortName = f.name.replace(/^.*\//, '');
    nameEl.textContent = shortName;
    nameEl.title = f.name;
    if (isShard) {
      const shardTag = document.createElement('span');
      shardTag.className = 'font-10';
      shardTag.style.cssText = 'color:#666677;flex-shrink:0';
      shardTag.textContent = '(sharded)';
      left.appendChild(qBadge); left.appendChild(nameEl); left.appendChild(shardTag);
    } else {
      left.appendChild(qBadge); left.appendChild(nameEl);
    }

    const right = document.createElement('div');
    right.className = 'd-flex align-items-center gap-2';
    right.style.flexShrink = '0';

    if (f.size) {
      const sizeEl = document.createElement('span');
      sizeEl.className = 'font-10';
      sizeEl.style.color = '#666677';
      sizeEl.textContent = fmtBytes(f.size);
      right.appendChild(sizeEl);
    }

    const btn = document.createElement('button');
    btn.className = 'btn btn-outline-secondary btn-sm py-0 px-2 font-10';
    btn.textContent = 'Pull';
    btn.addEventListener('click', () => pullHFFile(repoId, f.name, row, btn, { ...cardMeta, hfRepoId: repoId, hfFilename: f.name, fileSize: f.size }));
    right.appendChild(btn);

    row.appendChild(left);
    row.appendChild(right);
    container.appendChild(row);
  });
}

async function pullHFFile(repoId, filename, rowEl, btn, meta = {}) {
  btn.disabled = true;
  btn.textContent = 'Starting\u2026';
  try {
    const r = await fetch('/api/hf/pull', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repoId, filename, meta }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    // Add progress row to the active downloads panel
    addHFDownloadRow(data.key, repoId, filename);
    btn.textContent = '↓…';
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Error';
    btn.title = e.message;
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Pull'; btn.title = ''; }, 4000);
  }
}

function addHFDownloadRow(key, repoId, filename) {
  const panel = document.getElementById('hfActiveDownloads');
  if (panel.children.length === 0) panel.style.marginTop = '10px';

  const wrap = document.createElement('div');
  wrap.id = 'hfdl-' + btoa(key).replace(/[^a-zA-Z0-9]/g, '');

  const topRow = document.createElement('div');
  topRow.className = 'd-flex justify-content-between font-10 mb-1';
  const nameEl = document.createElement('span');
  nameEl.className = 'text-secondary';
  nameEl.style.overflow = 'hidden';
  nameEl.style.textOverflow = 'ellipsis';
  nameEl.style.whiteSpace = 'nowrap';
  nameEl.textContent = filename;
  const labelEl = document.createElement('span');
  labelEl.className = 'text-teal';
  labelEl.style.flexShrink = '0';
  labelEl.textContent = '0%';
  topRow.appendChild(nameEl);
  topRow.appendChild(labelEl);

  const progWrap = document.createElement('div');
  progWrap.className = 'progress';
  progWrap.style.height = '4px';
  const barEl = document.createElement('div');
  barEl.className = 'progress-bar bg-success';
  barEl.style.width = '0%';
  barEl.style.transition = 'width 0.4s ease';
  progWrap.appendChild(barEl);

  wrap.appendChild(topRow);
  wrap.appendChild(progWrap);
  panel.appendChild(wrap);

  hfProgressEls.set(key, { barEl, labelEl, wrap });
}

function updateHFProgress(key, bytes, total) {
  const el = hfProgressEls.get(key);
  if (!el) return;
  if (total > 0) {
    const pct = Math.round((bytes / total) * 100);
    el.barEl.style.width = pct + '%';
    el.labelEl.textContent = `${pct}% · ${fmtBytes(bytes)} / ${fmtBytes(total)}`;
  } else {
    el.labelEl.textContent = fmtBytes(bytes);
  }
}

function onHFDone(key, alias) {
  const el = hfProgressEls.get(key);
  if (el) {
    el.barEl.style.width = '100%';
    el.barEl.className = 'progress-bar bg-success';
    el.labelEl.textContent = `✓ done · alias: ${alias}`;
    setTimeout(() => { el.wrap.remove(); hfProgressEls.delete(key); }, 8000);
  }
}

function onHFError(key, errMsg) {
  const el = hfProgressEls.get(key);
  if (el) {
    el.barEl.className = 'progress-bar bg-danger';
    el.barEl.style.width = '100%';
    el.labelEl.textContent = '✗ ' + errMsg;
    el.labelEl.style.color = '#ff4757';
    setTimeout(() => { el.wrap.remove(); hfProgressEls.delete(key); }, 10000);
  }
}

async function loadHFDownloads() {
  try {
    const r = await fetch('/api/hf/downloads');
    const data = await r.json();
    for (const d of data.downloads) {
      if (!d.done && !d.error && !hfProgressEls.has(d.key)) {
        addHFDownloadRow(d.key, d.repoId, d.filename);
        updateHFProgress(d.key, d.bytes, d.total);
      }
    }
  } catch {}
}

function fmtBytes(b) {
  b = +b;
  if (!b || !isFinite(b)) return '—';
  if (b >= 1e9) return (b / 1e9).toFixed(1) + ' GB';
  if (b >= 1e6) return (b / 1e6).toFixed(0) + ' MB';
  if (b >= 1e3) return (b / 1e3).toFixed(0) + ' KB';
  return b + ' B';
}

function fmtNum(n) {
  n = +n;
  if (!isFinite(n)) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(Math.round(n));
}
