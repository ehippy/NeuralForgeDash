<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralForge</title>
<link id="dynFavicon" rel="icon" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<style>
  .log-line { white-space: pre-wrap; word-break: break-all; font-family: monospace; font-size: 12px; }
  .log-line.info { color: var(--bs-teal); }
  .log-line.warn { color: var(--bs-warning); }
  .log-line.err  { color: var(--bs-danger); }
  .model-card { transition: border-color 0.2s, box-shadow 0.2s; color: var(--bs-body-color) !important; }
  .model-card:hover:not(:disabled) { border-color: var(--bs-primary) !important; background-color: transparent !important; box-shadow: 0 0 0 1px var(--bs-primary); }
  .model-card.active { border-color: var(--bs-success) !important; background-color: transparent !important; box-shadow: 0 0 0 1px var(--bs-success); }
  .model-card:disabled { cursor: not-allowed; }
  .run-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--bs-secondary); flex-shrink:0; transition:background 0.3s, box-shadow 0.3s; }
  .run-dot.live { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.25), 0 0 10px rgba(34,197,94,0.5); }
  #aliasGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  [x-cloak] { display: none !important; }
</style>
</head>
<body x-data>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3 py-2">
  <div class="d-flex align-items-center gap-2">
    <i class="bi bi-cpu-fill text-success" style="font-size:1.4rem"></i>
    <span class="fw-bold fs-5 text-success">NeuralForge</span>
  </div>
  <div class="d-flex align-items-center gap-3 ms-auto">
    <!-- GPU/CPU mini-stats -->
    <div class="d-flex align-items-center gap-3 border-end border-secondary pe-3" style="font-size:0.65rem;line-height:1.3">
      <div id="gpuStat" style="min-width:54px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">GPU</span><span id="gpuBusyVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar" id="gpuBusyBar" role="progressbar" style="width:0%"></div></div>
      </div>
      <div id="cpuStat" style="min-width:54px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">CPU</span><span id="cpuBusyVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar" id="cpuBusyBar" role="progressbar" style="width:0%"></div></div>
      </div>
      <div style="min-width:80px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">GTT</span><span id="gttVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar bg-success" id="gttBar" role="progressbar" style="width:0%"></div></div>
      </div>
      <div style="min-width:72px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">Disk</span><span id="diskVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar bg-warning" id="diskBar" role="progressbar" style="width:0%"></div></div>
      </div>
    <button class="btn btn-outline-secondary btn-sm" @click="$store.nf.addFromHF()" title="Add model from HuggingFace">🤗</button>
    <a class="btn btn-outline-secondary btn-sm" href="http://localhost:3000" target="_blank">Open WebUI</a>
  </div>
</nav>

<main class="container-fluid px-3 py-3 d-flex flex-column gap-3">

  <!-- Model grid -->
  <div>
    <p class="text-secondary text-uppercase mb-3" style="font-size:0.7rem;letter-spacing:0.1em;font-weight:600">Models</p>
    <div id="aliasGrid">
      <template x-for="[alias, info] in Object.entries($store.nf.models.aliases)" :key="alias">
        <div
          class="model-btn model-card border rounded text-start w-100"
          style="padding: 1rem 1.1rem; border-color: var(--bs-secondary-border-subtle)"
          :data-alias="alias"
          :class="{ 'border-success active': $store.nf.instances[alias]?.running }">

          <!-- header: dot + alias + links -->
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="run-dot" :class="{ live: $store.nf.instances[alias]?.running }"></span>
            <span class="fw-semibold" style="font-size:0.95rem" x-text="alias"></span>
            <div class="d-flex align-items-center gap-2 ms-auto">
              <span x-show="info.fileSize" class="text-secondary" style="font-size:0.75rem" x-text="fmtBytes(info.fileSize)"></span>
              <a x-show="info.hfRepoId"
                :href="`https://huggingface.co/${info.hfRepoId}`"
                target="_blank" rel="noopener noreferrer"
                title="Open on HuggingFace"
                class="text-secondary text-decoration-none"
                style="font-size:0.75rem"
                @click.stop>↗</a>
              <template x-if="!info.hfRepoId || !info.arch || !info.caps">
                <button
                  :title="info.hfRepoId ? 'Re-sync HuggingFace metadata' : 'Link to HuggingFace repo'"
                  class="btn btn-link btn-sm text-secondary p-0"
                  style="font-size:0.75rem;line-height:1"
                  x-text="info.hfRepoId ? '↻' : '🔗 HF'"
                  @click.stop="$store.nf.syncHF(alias, info)">
                </button>
              </template>
            </div>
          </div>

          <!-- model name -->
          <div class="text-secondary mb-2" style="font-size:0.8rem;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden"
            :title="info.name" x-text="info.name"></div>

          <!-- params -->
          <div class="text-secondary mb-3" style="font-size:0.75rem"
            x-text="[
              `ctx ${fmtCtx(info.ctx || 32768)}`,
              `${info.parallel || 2} slots`,
              ...(info.arch ? [info.arch] : []),
              ...(info.pipeline ? [info.pipeline.replace('text-generation','text-gen').replace(/-/g,' ')] : [])
            ].join(' · ')">
          </div>

          <!-- caps badges -->
          <template x-if="info.caps && info.caps.length">
            <div class="d-flex flex-wrap gap-1 mb-3">
              <template x-for="cap in info.caps" :key="cap">
                <span class="badge text-bg-secondary" style="font-size:0.68rem" x-text="cap"></span>
              </template>
            </div>
          </template>

          <!-- autoload toggle -->
          <div class="d-flex align-items-center gap-2 mb-3" style="font-size:0.78rem" @click.stop>
            <input type="checkbox" class="form-check-input mt-0"
              :id="`autoload-${alias}`"
              style="width:13px;height:13px;cursor:pointer"
              :checked="info.autoLoad"
              @change="$store.nf.setAutoLoad(alias, $event.target.checked, $event.target)">
            <label :for="`autoload-${alias}`" class="text-secondary mb-0" style="cursor:pointer">autoload on start</label>
          </div>

          <!-- load + delete buttons (shown when not running) -->
          <template x-if="!$store.nf.instances[alias]?.running">
            <div class="d-flex gap-2">
              <button
                class="btn btn-sm btn-outline-success flex-grow-1"
                style="font-size:0.78rem"
                :title="`Load ${alias}`"
                @click.stop="$store.nf.confirmStart(alias, info.name)"><i class="bi bi-play-fill"></i> Load</button>
              <button
                class="btn btn-sm btn-outline-danger"
                style="font-size:0.78rem"
                title="Delete model"
                @click.stop="$store.nf.deleteModel(alias, info.name)"><i class="bi bi-trash"></i></button>
            </div>
          </template>

          <!-- runtime info (shown when running) -->
          <template x-if="$store.nf.instances[alias]?.running">
            <div class="mt-3 pt-3 border-top border-secondary">
              <div class="d-flex gap-3 text-secondary mb-2" style="font-size:0.78rem">
                <span x-text="`up ${fmtUptime($store.nf.instances[alias]?.uptime || 0)}`"></span>
                <span x-show="$store.nf.instances[alias]?.metrics?.tps" x-text="`${$store.nf.instances[alias]?.metrics?.tps} t/s`"></span>
                <span x-show="$store.nf.instances[alias]?.metrics?.processing != null" x-text="`${$store.nf.instances[alias]?.metrics?.processing} req`"></span>
                <span class="ms-auto text-secondary" style="font-size:0.72rem" x-text="`pid ${$store.nf.instances[alias]?.pid || '—'}`"></span>
              </div>
              <div class="d-flex gap-3 mb-2" style="font-size:0.78rem">
                <a :href="`http://localhost:${$store.nf.instances[alias]?.port}`" class="text-success text-decoration-none" target="_blank" @click.stop x-text="`→ :${$store.nf.instances[alias]?.port}`"></a>
                <a :href="`http://localhost:${$store.nf.instances[alias]?.port}/docs`" class="text-secondary text-decoration-none" target="_blank" @click.stop>API docs</a>
              </div>
              <button
                class="card-stop-btn btn btn-sm btn-outline-danger w-100"
                style="font-size:0.78rem"
                :title="`Stop ${alias}`"
                @click.stop="$store.nf.stopInstance(alias, $event.target)"><i class="bi bi-stop-fill"></i> Stop</button>
            </div>
          </template>

        </div>
      </template>
    </div>

    <!-- Discovered models section -->
    <div class="mt-4" x-show="$store.nf.discoveredExtra.length > 0" x-cloak>
      <p class="text-secondary small mb-2">Discovered (not in models.json)</p>
      <div class="d-flex flex-wrap gap-2">
        <template x-for="m in $store.nf.discoveredExtra" :key="m.path">
          <button class="btn btn-outline-secondary btn-sm"
            :title="m.path"
            @click="alert('Discovered models: add to models.json aliases to use them.')">
            <span class="small text-secondary" x-text="m.name"></span>
          </button>
        </template>
      </div>
    </div>
  </div>

  <!-- HuggingFace active downloads -->
  <div id="hfActiveDownloads" class="d-flex flex-column gap-2"></div>

  <!-- Server log -->
  <div class="card bg-dark border-secondary" style="height:200px;display:flex;flex-direction:column">
    <div class="card-body d-flex flex-column p-2" style="min-height:0">
      <h6 class="card-subtitle mb-2 text-secondary text-uppercase small px-1">Server Log</h6>
      <div class="border border-secondary rounded p-2 flex-grow-1 overflow-auto" id="logBody">
        <div id="logInner"></div>
      </div>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
