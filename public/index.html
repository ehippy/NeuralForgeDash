<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralForge</title>
<link id="dynFavicon" rel="icon" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<style>
  .log-line { white-space: pre-wrap; word-break: break-all; font-family: monospace; font-size: 12px; }
  .log-line.info { color: var(--bs-teal); }
  .log-line.warn { color: var(--bs-warning); }
  .log-line.err  { color: var(--bs-danger); }
  .model-card { cursor: pointer; transition: border-color 0.15s; }
  .model-card:hover:not(:disabled) { border-color: var(--bs-primary) !important; background-color: transparent !important; color: inherit !important; }
  .model-card.active { border-color: var(--bs-success) !important; background-color: transparent !important; color: inherit !important; }
  .model-card:disabled { opacity: 0.45; cursor: not-allowed; }
  #aliasGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  [x-cloak] { display: none !important; }
</style>
</head>
<body x-data>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3 py-2">
  <div class="d-flex align-items-center gap-2">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:22px;height:22px" class="text-success">
      <polygon points="12,2 22,7 22,17 12,22 2,17 2,7"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <span class="fw-bold fs-5 text-success">NeuralForge</span>
  </div>
  <div class="d-flex align-items-center gap-3 ms-auto">
    <!-- GPU/CPU mini-stats -->
    <div class="d-flex align-items-center gap-3 border-end border-secondary pe-3" style="font-size:0.65rem;line-height:1.3">
      <div style="min-width:54px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">GPU</span><span id="gpuBusyVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar" id="gpuBusyBar" role="progressbar" style="width:0%"></div></div>
      </div>
      <div style="min-width:54px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">CPU</span><span id="cpuBusyVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar" id="cpuBusyBar" role="progressbar" style="width:0%"></div></div>
      </div>
      <div style="min-width:80px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">GTT</span><span id="gttVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar bg-success" id="gttBar" role="progressbar" style="width:0%"></div></div>
      </div>
      <div style="min-width:66px">
        <div class="d-flex justify-content-between mb-1"><span class="text-secondary">VRAM</span><span id="vramVal">—</span></div>
        <div class="progress" style="height:3px"><div class="progress-bar" id="vramBar" role="progressbar" style="width:0%"></div></div>
      </div>
      <div style="white-space:nowrap">
        <div><span class="text-secondary me-1">Clk</span><span id="gpuClock">—</span></div>
        <div><span class="text-secondary me-1">Tmp</span><span id="cpuTemp">—</span></div>
      </div>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="http://localhost:3000" target="_blank">Open WebUI</a>
  </div>
</nav>

<main class="container-fluid px-3 py-3 d-flex flex-column gap-3">

  <!-- Model grid -->
  <div class="card bg-dark border-secondary">
    <div class="card-body">
      <h6 class="card-subtitle mb-3 text-secondary text-uppercase small">Models</h6>
      <div id="aliasGrid">
        <template x-for="[alias, info] in Object.entries($store.nf.models.aliases)" :key="alias">
          <button
            class="model-btn model-card btn btn-outline-secondary text-start w-100 p-2"
            :data-alias="alias"
            :disabled="$store.nf.instances[alias]?.switching"
            :class="{ 'border-success active': $store.nf.instances[alias]?.running }"
            @click="$store.nf.instances[alias]?.running ? null : $store.nf.confirmStart(alias, info.name)">

            <!-- top row: dot + alias + size + hf link + sync btn -->
            <div class="d-flex justify-content-between align-items-center mb-1">
              <div class="d-flex align-items-center gap-1">
                <span style="width:7px;height:7px;border-radius:50%;background-color:var(--bs-success);flex-shrink:0"
                  :style="{ display: $store.nf.instances[alias]?.running ? 'inline-block' : 'none' }"></span>
                <span class="small fw-semibold" x-text="alias"></span>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span x-show="info.fileSize" class="text-secondary small" x-text="fmtBytes(info.fileSize)"></span>
                <a x-show="info.hfRepoId"
                  :href="`https://huggingface.co/${info.hfRepoId}`"
                  target="_blank" rel="noopener noreferrer"
                  title="Open on HuggingFace"
                  class="text-secondary text-decoration-none"
                  style="font-size:11px"
                  @click.stop>↗</a>
                <template x-if="!info.hfRepoId || !info.arch || !info.caps">
                  <button
                    :title="info.hfRepoId ? 'Re-sync HuggingFace metadata' : 'Link to HuggingFace repo'"
                    class="btn btn-link btn-sm text-secondary p-0"
                    style="font-size:11px"
                    x-text="info.hfRepoId ? '↻' : '🔗 HF'"
                    @click.stop="$store.nf.syncHF(alias, info)">
                  </button>
                </template>
              </div>
            </div>

            <!-- model name -->
            <div class="text-secondary mb-1" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
              :title="info.name" x-text="info.name"></div>

            <!-- params row -->
            <div class="text-secondary mb-1" style="font-size:11px"
              x-text="[
                `ctx ${fmtCtx(info.ctx || 32768)}`,
                `${info.parallel || 2} slots`,
                ...(info.arch ? [info.arch] : []),
                ...(info.pipeline ? [info.pipeline.replace('text-generation','text-gen').replace(/-/g,' ')] : [])
              ].join(' · ')">
            </div>

            <!-- autoload toggle -->
            <div class="d-flex align-items-center gap-1 mt-1" style="font-size:11px" @click.stop>
              <input type="checkbox" class="form-check-input mt-0"
                :id="`autoload-${alias}`"
                style="width:11px;height:11px;cursor:pointer"
                :checked="info.autoLoad"
                @change="$store.nf.setAutoLoad(alias, $event.target.checked, $event.target)">
              <label :for="`autoload-${alias}`" class="text-secondary mb-0" style="cursor:pointer;font-size:11px">autoload</label>
            </div>

            <!-- runtime info (shown when running) -->
            <template x-if="$store.nf.instances[alias]?.running">
              <div class="mt-1 pt-1 border-top border-secondary">
                <div class="d-flex gap-2 text-secondary mb-1" style="font-size:11px">
                  <span x-text="`up ${fmtUptime($store.nf.instances[alias]?.uptime || 0)}`"></span>
                  <span x-show="$store.nf.instances[alias]?.metrics?.tps" x-text="`${$store.nf.instances[alias]?.metrics?.tps} t/s`"></span>
                  <span x-show="$store.nf.instances[alias]?.metrics?.processing != null" x-text="`${$store.nf.instances[alias]?.metrics?.processing} req`"></span>
                  <span class="ms-auto" x-text="`pid ${$store.nf.instances[alias]?.pid || '—'}`"></span>
                </div>
                <div class="d-flex gap-2" style="font-size:11px">
                  <a :href="`http://localhost:${$store.nf.instances[alias]?.port}`" class="text-success" target="_blank" @click.stop x-text="`→ :${$store.nf.instances[alias]?.port}`"></a>
                  <a :href="`http://localhost:${$store.nf.instances[alias]?.port}/docs`" class="text-secondary" target="_blank" @click.stop>docs</a>
                </div>
                <button
                  class="card-stop-btn btn btn-sm btn-outline-danger w-100 mt-1 py-0"
                  style="font-size:11px"
                  :title="`Stop ${alias}`"
                  @click.stop="$store.nf.stopInstance(alias, $event.target)">■ stop</button>
              </div>
            </template>

            <!-- caps badges -->
            <template x-if="info.caps && info.caps.length">
              <div class="d-flex flex-wrap gap-1 mt-1">
                <template x-for="cap in info.caps" :key="cap">
                  <span class="badge text-bg-secondary" style="font-size:10px" x-text="cap"></span>
                </template>
              </div>
            </template>
          </button>
        </template>
      </div>

      <!-- Discovered models section -->
      <div class="mt-3" x-show="$store.nf.discoveredExtra.length > 0" x-cloak>
        <p class="text-secondary small mb-2">Discovered (not in models.json)</p>
        <div class="d-flex flex-wrap gap-2">
          <template x-for="m in $store.nf.discoveredExtra" :key="m.path">
            <button class="btn btn-outline-secondary btn-sm"
              :title="m.path"
              @click="alert('Discovered models: add to models.json aliases to use them.')">
              <span class="small text-secondary" x-text="m.name"></span>
            </button>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- HuggingFace Hub -->
  <div class="card bg-dark border-secondary">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center" style="cursor:pointer"
        @click="$store.nf.toggleHF()">
        <h6 class="card-subtitle text-secondary text-uppercase small mb-0">HuggingFace Hub</h6>
        <span class="text-secondary small" style="transition:transform 0.2s" id="hfToggleIcon"
          :style="{ transform: $store.nf.hfOpen ? 'rotate(90deg)' : '' }">▶</span>
      </div>
      <div x-show="$store.nf.hfOpen" x-cloak style="margin-top:12px">
        <input type="text" id="hfSearchInput" class="form-control form-control-sm mb-2"
          placeholder="Search GGUF models on HuggingFace…" autocomplete="off">
        <div id="hfResults" class="d-flex flex-column gap-1" style="max-height:280px;overflow-y:auto"></div>
        <div id="hfActiveDownloads" class="d-flex flex-column gap-2"></div>
      </div>
    </div>
  </div>

  <!-- Server log -->
  <div class="card bg-dark border-secondary" style="height:200px;display:flex;flex-direction:column">
    <div class="card-body d-flex flex-column p-2" style="min-height:0">
      <h6 class="card-subtitle mb-2 text-secondary text-uppercase small px-1">Server Log</h6>
      <div class="border border-secondary rounded p-2 flex-grow-1 overflow-auto" id="logBody">
        <div id="logInner"></div>
      </div>
    </div>
  </div>

</main>

<!-- Load confirmation modal (Alpine-driven) -->
<div x-show="$store.nf.pendingAlias !== null"
  x-cloak
  style="position:fixed;inset:0;z-index:1050;display:flex;align-items:center;justify-content:center"
  @click.self="$store.nf.pendingAlias = null">
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5)"></div>
  <div class="modal-dialog modal-sm mb-0" style="position:relative;z-index:1">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-header border-secondary py-2">
        <h6 class="modal-title">Load Model</h6>
        <button type="button" class="btn-close btn-close-white" @click="$store.nf.pendingAlias = null"></button>
      </div>
      <div class="modal-body">
        <p class="text-secondary small mb-0" x-text="`Load &quot;${$store.nf.models.aliases[$store.nf.pendingAlias]?.name}&quot;?`"></p>
      </div>
      <div class="modal-footer border-secondary py-2">
        <button class="btn btn-secondary btn-sm" @click="$store.nf.pendingAlias = null">Cancel</button>
        <button class="btn btn-success btn-sm" @click="$store.nf.doStart()">Load</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
